version: '3.8'

services:
  postgresdb:
    image: postgres:17
    container_name: form_builder_db
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rukhaam2006
      POSTGRES_DB: formbuilder
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped


  valkey:
    image: valkey/valkey:8.1.8-alpine
    container_name: form_builder_valkey
    ports:
      - '6379:6379'
    volumes:
      - valkey_data:/data
    restart: unless-stopped
    command: valkey-server --save 60 1 --loglevel warning

volumes:
  postgres_data:
  valkey_data:
